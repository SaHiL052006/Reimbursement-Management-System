<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to your ReimburseFlow account to manage expenses and approvals.">
    <title>Login – ReimburseFlow</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <div class="logo-icon">💸</div>
                    <h1>ReimburseFlow</h1>
                    <p>Welcome back</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="you@company.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" id="loginBtn" class="btn btn-primary btn-block btn-lg mt-2">
                        Sign In
                    </button>
                </form>

                <p class="text-center text-muted text-sm mt-3">
                    Don't have an account? <a href="/signup.html">Create one</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script>
        if (API.isAuthenticated()) {
            const user = API.getUser();
            if (user.role === 'admin') window.location.href = '/admin/dashboard';
            else if (user.role === 'manager') window.location.href = '/manager/dashboard';
            else window.location.href = '/employee/dashboard';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            UI.setButtonLoading(btn, true);

            try {
                const data = await API.login({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                });

                API.setToken(data.token);
                API.setUser(data.user);
                UI.success('Welcome back! 👋');

                setTimeout(() => {
                    const role = data.user.role;
                    if (role === 'admin') window.location.href = '/admin/dashboard';
                    else if (role === 'manager') window.location.href = '/manager/dashboard';
                    else window.location.href = '/employee/dashboard';
                }, 800);
            } catch (err) {
                UI.error(err.message);
            } finally {
                UI.setButtonLoading(btn, false);
            }
        });
    </script>
</body>
</html>
