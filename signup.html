<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your ReimburseFlow account and start managing expense reimbursements.">
    <title>Sign Up – ReimburseFlow</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <div class="logo-icon">💸</div>
                    <h1>ReimburseFlow</h1>
                    <p>Create your account</p>
                </div>

                <form id="signupForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="john@company.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label for="country">Country</label>
                        <select id="country" class="form-control" required>
                            <option value="">Select your country</option>
                        </select>
                        <span class="form-hint" id="currencyHint"></span>
                    </div>

                    <button type="submit" id="signupBtn" class="btn btn-primary btn-block btn-lg mt-2">
                        Create Account
                    </button>
                </form>

                <p class="text-center text-muted text-sm mt-3">
                    Already have an account? <a href="/login.html">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // Redirect if logged in
        if (API.isAuthenticated()) {
            const user = API.getUser();
            if (user.role === 'admin') window.location.href = '/admin/dashboard';
            else if (user.role === 'manager') window.location.href = '/manager/dashboard';
            else window.location.href = '/employee/dashboard';
        }

        let countriesData = [];

        // Load countries
        async function loadCountries() {
            try {
                const data = await API.getCountries();
                countriesData = data.countries || [];
                const select = document.getElementById('country');
                
                // Get unique countries
                const seen = new Set();
                countriesData.forEach(c => {
                    if (!seen.has(c.country)) {
                        seen.add(c.country);
                        const opt = document.createElement('option');
                        opt.value = c.country;
                        opt.textContent = c.country;
                        select.appendChild(opt);
                    }
                });
            } catch (err) {
                // Add common countries as fallback
                const fallback = ['United States', 'United Kingdom', 'India', 'Canada', 'Australia', 'Germany', 'Japan', 'France'];
                const select = document.getElementById('country');
                fallback.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c;
                    opt.textContent = c;
                    select.appendChild(opt);
                });
            }
        }

        // Show currency on country change
        document.getElementById('country').addEventListener('change', function() {
            const country = this.value;
            const match = countriesData.find(c => c.country === country);
            const hint = document.getElementById('currencyHint');
            if (match) {
                hint.textContent = `Default currency: ${match.currency_code} (${match.currency_symbol})`;
                hint.style.color = 'var(--primary-400)';
            } else {
                hint.textContent = '';
            }
        });

        // Handle signup
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            UI.setButtonLoading(btn, true);

            try {
                const data = await API.signup({
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    country: document.getElementById('country').value
                });

                API.setToken(data.token);
                API.setUser(data.user);
                UI.success('Account created! Welcome aboard! 🎉');

                setTimeout(() => {
                    const role = data.user.role;
                    if (role === 'admin') window.location.href = '/admin/dashboard';
                    else if (role === 'manager') window.location.href = '/manager/dashboard';
                    else window.location.href = '/employee/dashboard';
                }, 1000);
            } catch (err) {
                UI.error(err.message);
            } finally {
                UI.setButtonLoading(btn, false);
            }
        });

        loadCountries();
    </script>
</body>
</html>
